services:
  webvault:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webvault_app
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - APP_USER=${APP_USER}
      - APP_PASSWORD_HASH=${APP_PASSWORD_HASH}
    volumes:
      - ./storage:/app/storage
      - ./config:/app/config
    restart: unless-stopped
